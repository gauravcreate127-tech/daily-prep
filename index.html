<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#2F4538" />
<title>Prep Tracker</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232F4538%22/><text x=%2250%22 y=%2268%22 font-size=%2250%22 fill=%22%23FAF6EE%22 text-anchor=%22middle%22 font-family=%22Georgia,serif%22>P</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --color-background-primary: #FFFDF8;
    --color-background-secondary: #F2ECDD;
    --color-background-tertiary: #EAE2CC;
    --color-background-info: #E3EBE1;
    --color-background-success: #E3EBE1;
    --color-background-danger: #F8E9E2;
    --color-background-warning: #FBF1DD;
    --color-text-primary: #2B2924;
    --color-text-secondary: #7A7466;
    --color-text-tertiary: #A89F8C;
    --color-text-info: #4A6B4D;
    --color-text-success: #4A6B4D;
    --color-text-danger: #B2603F;
    --color-text-warning: #A37A2A;
    --color-border-tertiary: rgba(43,41,36,0.10);
    --color-border-secondary: rgba(43,41,36,0.18);
    --color-border-primary: rgba(43,41,36,0.28);
    --color-border-info: #5C7A5E;
    --color-accent-gold: #C9A24B;
    --color-ink: #2F4538;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-serif: 'Lora', Georgia, serif;
    --border-radius-md: 8px;
    --border-radius-lg: 14px;
    --border-radius-xl: 18px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #20251F;
      --color-background-secondary: #2A2F26;
      --color-background-tertiary: #1A1E17;
      --color-background-info: #324A35;
      --color-background-success: #324A35;
      --color-background-danger: #4A352A;
      --color-background-warning: #4A3D22;
      --color-text-primary: #F2ECDD;
      --color-text-secondary: #B4AB97;
      --color-text-tertiary: #837A68;
      --color-text-info: #9CC49E;
      --color-text-success: #9CC49E;
      --color-text-danger: #E0A687;
      --color-text-warning: #E5C172;
      --color-border-tertiary: rgba(242,236,221,0.10);
      --color-border-secondary: rgba(242,236,221,0.18);
      --color-border-primary: rgba(242,236,221,0.28);
      --color-border-info: #7FA982;
      --color-accent-gold: #D9B968;
      --color-ink: #9CC49E;
    }
    body { background: #14170F; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    background: var(--color-background-tertiary);
    -webkit-tap-highlight-color: transparent;
    background-image:
      linear-gradient(var(--color-background-tertiary), var(--color-background-tertiary)),
      repeating-linear-gradient(0deg, transparent, transparent 27px, var(--color-border-tertiary) 27px, var(--color-border-tertiary) 28px);
  }
  #root { min-height: 100vh; }
  h1, h2, h3 { font-family: var(--font-serif); font-weight: 600; }
  input, textarea, select {
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 8px 10px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
  }
  input:focus, textarea:focus, select:focus {
    outline: 2px solid var(--color-border-info);
    outline-offset: 1px;
  }
  button {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 14px;
    padding: 8px 14px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover { background: var(--color-background-secondary); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--color-border-info);
  }
  ::placeholder { color: var(--color-text-tertiary); }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css" />
</head>
<body>
<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "recharts": "https://esm.sh/recharts@2.10.3?deps=react@18.2.0,react-dom@18.2.0"
  }
}
</script>
<script type="module">
import React from 'react';
import { createRoot } from 'react-dom/client';
import App from './ExamPrepTracker.js';

const root = createRoot(document.getElementById('root'));
root.render(React.createElement(App));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
