<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0F6E56" />
<title>Prep Tracker</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230F6E56%22/><text x=%2250%22 y=%2265%22 font-size=%2250%22 fill=%22white%22 text-anchor=%22middle%22 font-family=%22sans-serif%22>P</text></svg>" />
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #F1EFE8;
    --color-background-tertiary: #E8E6DE;
    --color-background-info: #E6F1FB;
    --color-background-success: #EAF3DE;
    --color-background-danger: #FCEBEB;
    --color-background-warning: #FAEEDA;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #5F5E5A;
    --color-text-tertiary: #888780;
    --color-text-info: #185FA5;
    --color-text-success: #3B6D11;
    --color-text-danger: #A32D2D;
    --color-text-warning: #854F0B;
    --color-border-tertiary: rgba(0,0,0,0.10);
    --color-border-secondary: rgba(0,0,0,0.18);
    --color-border-primary: rgba(0,0,0,0.25);
    --color-border-info: #378ADD;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-serif: Georgia, serif;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --border-radius-xl: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1a;
      --color-background-secondary: #2C2C2A;
      --color-background-tertiary: #383836;
      --color-background-info: #0C447C;
      --color-background-success: #27500A;
      --color-background-danger: #791F1F;
      --color-background-warning: #633806;
      --color-text-primary: #f0f0ec;
      --color-text-secondary: #B4B2A9;
      --color-text-tertiary: #888780;
      --color-text-info: #85B7EB;
      --color-text-success: #97C459;
      --color-text-danger: #F09595;
      --color-text-warning: #FAC775;
      --color-border-tertiary: rgba(255,255,255,0.12);
      --color-border-secondary: rgba(255,255,255,0.2);
      --color-border-primary: rgba(255,255,255,0.3);
      --color-border-info: #378ADD;
    }
    body { background: #141412; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    background: var(--color-background-tertiary);
    -webkit-tap-highlight-color: transparent;
  }
  #root { background: var(--color-background-tertiary); min-height: 100vh; }
  input, textarea, select {
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 8px 10px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
  }
  input:focus, textarea:focus, select:focus {
    outline: 2px solid var(--color-border-info);
    outline-offset: 1px;
  }
  button {
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 8px 14px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    cursor: pointer;
  }
  button:hover { background: var(--color-background-secondary); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--color-border-info);
  }
  ::placeholder { color: var(--color-text-tertiary); }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css" />
</head>
<body>
<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "recharts": "https://esm.sh/recharts@2.10.3?deps=react@18.2.0,react-dom@18.2.0"
  }
}
</script>
<script type="module">
import React from 'react';
import { createRoot } from 'react-dom/client';
import App from './ExamPrepTracker.js';

const root = createRoot(document.getElementById('root'));
root.render(React.createElement(App));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
